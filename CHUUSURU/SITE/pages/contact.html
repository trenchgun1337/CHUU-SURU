<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHUU-SURU | CONTACT</title>
    <link rel="icon" href="../assets/images/24c31b12283884072f476dde871276d8.jpg" type="image/x-icon">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { min-height: 100%; }

        body {
            background-image: url(../assets/images/13b670f4862e228ea8ce1cccb6ea9912.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            color: #ffffff;
            font-size: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        ::selection { background: #fc6397; color: #ffffff; }
        ::-webkit-scrollbar { width: 14px; height: 14px; }
        ::-webkit-scrollbar-track { background: #ffffff; border-left: 2px solid #6e0034; }
        ::-webkit-scrollbar-thumb { background: #fc6397; border: 2px solid #ffffff; border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: #e03b75; }

        .page {
            background-color: #ffffff;
            border: 5px solid transparent;
            border-image: linear-gradient(360deg, #e03b75 0%, #fc6397 50%, #ffd6ee 100%) 1;
            max-width: 50%;
            width: 50%;
            margin: 0 auto;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 32px 48px;
            box-shadow: #6e0034 7px 4px 0px;
            border-radius: 0;
        }

        h1 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 900%;
            font-weight: bold;
            line-height: 1;
            margin-bottom: 24px;
            background: linear-gradient(360deg, #e03b75 0%, #fc6397 50%, #ffd6ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-text {
            margin-top: 16px;
            text-align: center;
            color: #6e0034;
            font-size: 30px;
        }

        a {
            color: #e03b75;
            text-decoration: none;
        }

        a:hover { color: #fc6397; }

        .email-link {
            font-size: 27px;
            font-style: italic;
        }

        img {
            width: 40%;
            max-width: 320px;
            margin-bottom: 8px;
        }

        .back-button {
            margin-top: auto;
            color: #e03b75;
            font-size: 17px;
            font-style: italic;
            padding-top: 32px;
        }

        footer {
            padding: 6px 0;
            text-align: center;
            font-size: 12px;
            color: #680030;
        }

        footer a {
            color: #ffffff;
            text-decoration: none;
            font-style: italic;
        }

        footer a:hover { text-decoration: underline; }

        footer p {
            margin-top: 0;
            color: #680030;
            font-size: 12px;
        }

        p {
            margin-top: 16px;
            text-align: center;
            color: #6e0034;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>CONTACT</h1>
        <img src="../assets/images/24c31b12283884072f476dde871276d8.jpg" alt="contact illustration">
        <p class="contact-text">For inquiries, please contact me at:</p>
        <a class="email-link" href="mailto:trenchgun1337@gmail.com">trenchgun1337@gmail.com</a>
        <a class="back-button" href="../public/index.html">Back</a>
    </div>

</body>
</html>
